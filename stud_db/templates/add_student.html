{% extends 'base.html' %}

{% block content %}
<h2>Add Student</h2>

<form method="POST">
    {% csrf_token %}

    <label>USN:</label>
    <input type="text" name="usn" required>

    <br><br>

    <label>Name:</label>
    <input type="text" name="name" required>

    <br><br>

    <label>Semester:</label>
    <input type="number" name="sem" required>

    <br><br>

    <button type="submit">Add Student</button>
</form>

{% endblock %}
