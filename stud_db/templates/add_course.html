{% extends 'base.html' %}

{% block content %}
<h2>Add Course</h2>

<form method="POST">
    {% csrf_token %} 
    {% comment %} csrf_token is a security token that Django uses to protect your form from attacks {% endcomment %}

    <label>Course Code:</label>
    <input type="text" name="coursecode" required>

    <br><br>

    <label>Course Name:</label>
    <input type="text" name="coursename" required>

    <br><br>

    <label>Credits:</label>
    <input type="number" name="credits" required>

    <br><br>

    <button type="submit">Add Course</button>
</form>

{% endblock %}
