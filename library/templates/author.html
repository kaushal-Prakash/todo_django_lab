{% extends 'base.html' %}

{% block title %}Authors{% endblock %}

{% block content %}
<h1>Authors</h1>
<a href="{% url 'add_author' %}" class="btn btn-primary mb-3">Add Author</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
        </tr>
    </thead>
    <tbody>
        {% for author in authors %}
        <tr>
            <td>{{ author.first_name }}</td>
            <td>{{ author.last_name }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No authors available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
