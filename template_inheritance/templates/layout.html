<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}My Website{% endblock %}</title>
    <style>
        body{
            font-family: Arial;
            margin:0;
            padding:0;
        }

        header{
            background:#222;
            color:white;
            padding:15px;
        }

        nav a{
            color:white;
            margin-right:20px;
            text-decoration:none;
            font-weight:bold;
        }

        nav a:hover{
            color:#f39c12;
        }

        .container{
            padding:40px;
            min-height:500px;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>

<body>

<header>
    <h2>My Website</h2>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About Us</a>
        <a href="/contact">Contact Us</a>
    </nav>
</header>


<div class="container">
    {% block content %}
    {% endblock %}
</div>


<footer>
    <p>© 2026 My Website | Developed by Kaushal</p>
</footer>

</body>
</html>
